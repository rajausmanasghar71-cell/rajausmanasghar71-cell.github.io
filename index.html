<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raja Usman Asghar - Personal Website</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; } 
        body { 
            font-family: 'Noto Nastaliq Urdu', Arial, sans-serif; 
            background: #0f172a; 
            color: #e2e8f0; 
            line-height: 1.8; 
            padding: 20px;
        } 
        .container { max-width: 700px; margin: 40px auto; } 
        .card { 
            background: #1e293b; 
            border-radius: 16px; 
            padding: 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            border: 1px solid #334155; 
        } 
        .profile-img { 
            width: 120px; height: 120px; 
            border-radius: 50%; 
            background: #3b82f6; 
            margin: 0 auto 20px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 48px; font-weight: bold; color: white; 
        } 
        h1 { text-align: center; color: #60a5fa; margin-bottom: 10px; font-size: 32px; } 
        .title { text-align: center; color: #94a3b8; margin-bottom: 30px; } 
        .info { margin: 20px 0; } 
        .info-item { 
            display: flex; 
            padding: 12px 0; 
            border-bottom: 1px solid #334155; 
        } 
        .info-item:last-child { border-bottom: none; } 
        .label { font-weight: bold; color: #60a5fa; min-width: 100px; } 
        .value { direction: ltr; text-align: left; flex: 1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="profile-img">RU</div>
            <h1>Raja Usman Asghar</h1>
            <p class="title">Student | Web Developer</p>
            <div class="info">
                <div class="info-item">
                    <span class="label">نام:</span>
                    <span class="value">Raja Usman Asghar</span>
                </div>
                <div class="info-item">
                    <span class="label">عمر:</span>
                    <span class="value">20 Years</span>
                </div>
                <div class="info-item">
                    <span class="label">شہر:</span>
                    <span class="value">Peshawar, Pakistan</span>
                </div>
                <div class="info-item">
                    <span class="label">ای میل:</span>
                    <span class="value">rajausmanasghar71@gmail.com</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
