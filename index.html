<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raja Usman Asghar - Night Sea</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; } 
        
        body { 
            font-family: 'Noto Nastaliq Urdu', Arial, sans-serif; 
            color: #e2e8f0; 
            line-height: 1.8; 
            padding: 20px;
            min-height: 100vh;
            background: #0a0a1a;
            background: linear-gradient(to bottom, #0a0a1a, #000000);
            overflow-x: hidden;
            position: relative;
        }

        .moon {
            position: fixed;
            top: 40px;
            left: 30px;
            width: 100px;
            height: 100px;
            background: #fefcd7;
            border-radius: 50%;
            box-shadow: 0 0 80px #fefcd7, 0 0 120px rgba(254, 252, 215, 0.5);
            z-index: 1;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60%;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .sea {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: linear-gradient(to top, #001e3c, #003a6b);
            z-index: 1;
        }
        .wave {
            position: absolute;
            bottom: 100%;
            left: 0;
            width: 200%;
            height: 120px;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg"><path fill="%23003a6b" fill-opacity="1" d="M0,160L48,176C96,192,192,224,288,213.3C384,203,480,149,576,133.3C672,117,768,139,864,165.3C960,192,1056,224,1152,218.7C1248,213,1344,171,1392,149.3L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
            animation: wave 8s linear infinite;
        }
        .wave:nth-child(2) {
            animation-delay: -4s;
            opacity: 0.5;
            bottom: 90%;
            height: 140px;
        }
        .wave:nth-child(3) {
            animation-delay: -2s;
            opacity: 0.3;
            bottom: 80%;
            height: 160px;
        }
        @keyframes wave {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        
        .container { max-width: 700px; margin: 40px auto; position: relative; z-index: 10; } 
        
        .card { 
            background: rgba(5, 10, 25, 0.9); 
            backdrop-filter: blur(20px);
            border-radius: 20px; 
            padding: 40px 25px; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.9); 
            position: relative;
            overflow: hidden;
        }

            z-index: 2;
