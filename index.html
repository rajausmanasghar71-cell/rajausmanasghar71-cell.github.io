<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raja Usman Asghar - Personal Website</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; } 
        
        body { 
            font-family: 'Noto Nastaliq Urdu', Arial, sans-serif; 
            color: #e2e8f0; 
            line-height: 1.8; 
            padding: 20px;
            min-height: 100vh;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #3b82f6, #8b5cf6, #ec4899);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .container { max-width: 700px; margin: 40px auto; } 
        
        .card { 
            background: rgba(30, 41, 59, 0.85); 
            backdrop-filter: blur(10px);
            border-radius: 20px; 
            padding: 40px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.1);
            animation: fadeIn 1s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .profile-img { 
            width: 140px; 
            height: 140px; 
            border-radius: 50%; 
            margin: 0 auto 20px; 
            display: block;
            border: 4px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.7);
            object-fit: cover;
            object-position: top;
        } 
        
        h1 { text-align: center; color: #fff; margin-bottom: 10px; font-size: 34px; } 
        .title { text-align: center; color: #cbd5e1; margin-bottom: 30px; font-size: 16px; } 
        
        .info { margin: 25px 0; } 
        .info-item { 
            display: flex; 
            padding: 16px; 
            margin: 12px 0;
            background: rgba(51, 65, 85, 0.6);
            border-radius: 12px;
            border-right: 3px solid #3b82f6;
            transition: 0.3s;
        } 
        .info-item:hover { 
            background: rgba(51, 65, 85, 0.9);
            transform: translateX(-5px);
        }
        .label { font-weight: bold; color: #60a5fa; min-width: 100px; } 
        .value { direction: ltr; text-align: left; flex: 1; }
        
        .social-links { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-top: 35px; 
            flex-wrap: wrap;
        } 
        
        .social-btn { 
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white; 
            text-decoration: none; 
            font-size: 24px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        } 
        
        .social-btn:hover { 
            transform: translateY(-8px) scale(1.15);
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
        }
        
        .facebook { background: linear-gradient(135deg, #1877f2, #0d5bdd); }
        .instagram { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .whatsapp { background: linear-gradient(135deg, #25d366, #128c7e); }
        .tiktok { background: linear-gradient(135deg, #000000, #ff0050); }
        .snapchat { background: linear-gradient(135deg, #fffc00, #fffc00); color: #000; }
        .github { background: linear-gradient(135deg, #333, #000); }
        
        .footer { text-align: center; margin-top: 25px; color: #94a3b8; font-size: 14px; }
    </style>
</head>
