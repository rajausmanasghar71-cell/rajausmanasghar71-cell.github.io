<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raja Usman Asghar - Dark Night</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; } 
        
        body { 
            font-family: 'Noto Nastaliq Urdu', Arial, sans-serif; 
            color: #e2e8f0; 
            line-height: 1.8; 
            padding: 20px;
            min-height: 100vh;
            background: #000428;
            background: linear-gradient(to bottom, #000428, #004e92);
            overflow-x: hidden;
            position: relative;
        }

        /* 1. چاند */
        .moon {
            position: fixed;
            top: 50px;
            left: 80px;
            width: 80px;
            height: 80px;
            background: #f5f3ce;
            border-radius: 50%;
            box-shadow: 0 0 60px #f5f3ce, 0 0 100px #f5f3ce;
            z-index: 1;
        }

        /* 2. ستارے */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 3. دریا Wave Effect */
        .river {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            background: linear-gradient(to top, #004e92, #009ffd);
            z-index: 1;
        }
        .wave {
            position: absolute;
            bottom: 100%;
            left: 0;
            width: 200%;
            height: 100px;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 120" xmlns="http://www.w3.org/2000/svg"><path d="M0 0v46.29c47.79 22.2 103.59 32.17 158 28 70.36-5.37 136.33-33.31 206.8-37.5 73.84-4.36 147.54 16.88 218.2 35.26 69.27 18 138.3 24.88 209.4 13.08 36.15-6 69.85-17.84 104.45-29.34C989.49 25 1113-14.29 1200 52.47V0z" fill="%23009ffd" opacity=".5"/></svg>');
            animation: wave 10s linear infinite;
        }
        .wave:nth-child(2) {
            animation-delay: -5s;
            opacity: 0.3;
            bottom: 90%;
        }
        @keyframes wave {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        
        .container { max-width: 700px; margin: 40px auto; position: relative; z-index: 10; } 
        
        /* 4. سانپ اور Corner Lighting والا Card */
        .card { 
            background: rgba(10, 15, 35, 0.8); 
            backdrop-filter: blur(15px);
            border-radius: 20px; 
            padding: 40px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.7); 
            border: 2px solid transparent;
            position: relative;
            animation: fadeIn 1s ease;
        }
        
        /* Corner Lighting - چاروں کونے */
        .card::before, .card::after {
            content: '';
            position: absolute;
            width: 60px;
            height: 60px;
            border: 3px solid #00ff88;
            animation: cornerGlow 2s infinite;
        }
        .card::before {
            top: -3px;
            left: -3px;
            border-right: none;
            border-bottom: none;
            border-radius: 20px 0 0 0;
        }
        .card::after {
            bottom: -3px;
            right: -3px;
            border-left: none;
            border-top: none;
            border-radius: 0 0 20px 0;
        }
        
        /* سانپ Animation */
        .snake-border {
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 20px;
            background: linear-gradient(90deg, transparent, #00ff88, transparent);
            background-size: 200% 100%;
            animation: snakeMove 3s linear infinite;
            z-index: -1;
        }
        
        @keyframes snakeMove {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        @keyframes cornerGlow {
            0%, 100% { box-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88; }
            50% { box-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88; }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .profile-img { 
            width: 140px; 
            height: 140px; 
            border-radius: 50%; 
            margin: 0 auto 20px; 
            display: block;
            border: 4px solid rgba(0, 255, 136, 0.5);
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.6);
            object-fit: cover;
            object-position: center top;
        } 
        
        h1 { text-align: center; color: #fff; margin-bottom: 10px; font-size: 34px; text-shadow: 0 0 10px rgba(255,255,255,0.5); } 
        .title { text-align: center; color: #8be9fd; margin-bottom: 30px; font-size: 16px; } 
        
        .info { margin: 25px 0; } 
        .info-item { 
            display: flex; 
            padding: 16px; 
            margin: 12px 0;
            background: rgba(0, 78, 146, 0.3);
            border-radius: 12px;
            border-right: 3px solid #00ff88;
            transition: 0.3s;
        } 
        .info-item:hover { 
            background: rgba(0, 78, 146, 0.5);
            transform: translateX(-5px);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }
        .label { font-weight: bold; color: #50fa7b; min-width: 100px; } 
        .value { direction: ltr; text-align: left; flex: 1; color: #f8f8f2; }
        
        .social-links { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-top: 35px; 
            flex-wrap: wrap;
        } 
        
        .social-btn { 
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white; 
            text-decoration: none; 
            font-size: 24px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.1);
        } 
        
        .social-btn:hover { 
            transform: translateY(-8px) scale(1.15);
            box-shadow: 0 0 25px currentColor;
        }
        
        .facebook { background: linear-gradient(135deg, #1877f2, #0d5bdd); }
        .instagram { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .whatsapp { background: linear-gradient(135deg, #25d366, #128c7e); }
        .tiktok { background: linear-gradient(135deg, #000000, #ff0050); }
        .snapchat { background: linear-gradient(135deg, #fffc00, #fffc00); color: #000; }
        .github { background: linear-gradient(135deg, #333, #000); }
        
        .footer { text-align: center; margin-top: 25px; color: #6272a4; font-size: 14px; }
    </style>
</head>
<body>

            <div class="footer">

    </div>

    <script>
        // ستارے بناؤ
        const starsContainer = document.getElementById('stars');
        for(let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
